name: Daily arXiv Digest

on:
  schedule:
    # 8:00 AM US Pacific Time (3 PM UTC; during PST this runs at 7 AM PT)
    - cron: '0 15 * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arXiv digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python arxiv_digest.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add markdown/
          git diff --cached --quiet || git commit -m "Add arXiv digest for $(date -u +%Y-%m-%d)"
          git pull --rebase origin master || true
          git push origin master
